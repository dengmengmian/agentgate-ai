[package]
name = "agentgate"
version = "1.1.2"
description = "Local gateway for AI coding agents"
authors = ["dengmengmian"]
edition = "2021"
default-run = "agentgate"
autobins = false

[lib]
name = "agentgate_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "agentgate"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "macos-private-api"] }
tauri-plugin-opener = "2"
tauri-plugin-autostart = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
# gzip/brotli/zstd 让 reqwest 自动解压上游响应——若上游返回压缩 SSE 流
# （即便我们没显式发 Accept-Encoding），bytes_stream/text 拿到的是明文。
# 否则 pass-through 会把压缩字节原样转给客户端，导致 SSE 帧解析失败。
reqwest = { version = "0.12", features = ["json", "stream", "gzip", "brotli", "zstd"] }
tokio = { version = "1", features = ["full"] }
axum = "0.7"
futures = "0.3"
async-stream = "0.3"
tokio-stream = "0.1"
bytes = "1"
flate2 = "1"
zstd = "0.13"
brotli = "8"
toml_edit = "0.22"
open = "5"
rand = "0.9"
tauri-plugin-updater = "2.10.1"
tauri-plugin-process = "2"
clap = { version = "4", features = ["derive", "env"] }
