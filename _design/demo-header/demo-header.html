<!-- animations.jsx pasted inline below -->
<script type="text/babel" data-presets="env,react">
/* ───────── inlined animations.jsx (Stage/Sprite/useTime/interpolate/Easing) ───────── */
(function() {
  const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;
  const TimeContext = createContext({ time: 0, duration: 10, playing: false });
  const SpriteContext = createContext(null);
  const Easing = {
    linear: t => t,
    easeIn: t => t * t,
    easeOut: t => 1 - (1 - t) * (1 - t),
    easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
    expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
  };
  function interpolate(t, input, output, easing) {
    const [a, b] = input, [c, d] = output;
    if (t <= a) return c;
    if (t >= b) return d;
    let p = (t - a) / (b - a);
    if (easing) p = easing(p);
    return c + (d - c) * p;
  }
  function useTime() { return useContext(TimeContext).time; }

  function Stage({ duration = 3.5, width = 1280, height = 640, loop = true, children, bgColor = '#0a0a0a' }) {
    const [time, setTime] = useState(0);
    const [scale, setScale] = useState(1);
    const rafRef = useRef(null);
    const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

    useEffect(() => {
      function fit() {
        const vw = window.innerWidth, vh = window.innerHeight;
        setScale(Math.min(vw / width, vh / height));
      }
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, [width, height]);

    useEffect(() => {
      let cancelled = false, last = null;
      function tick(now) {
        if (cancelled) return;
        if (last === null) {
          last = now;
          if (typeof window !== 'undefined') window.__ready = true;
        }
        const delta = (now - last) / 1000;
        last = now;
        setTime(prev => {
          const next = prev + delta;
          if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
          return next;
        });
        rafRef.current = requestAnimationFrame(tick);
      }
      const start = () => { if (!cancelled) rafRef.current = requestAnimationFrame(tick); };
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(start);
      else start();
      return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
    }, [duration, effectiveLoop]);

    const canvasStyle = {
      position: 'absolute', top: '50%', left: '50%',
      width, height, background: bgColor,
      transform: `translate(-50%, -50%) scale(${scale})`,
      transformOrigin: 'center center',
      overflow: 'hidden',
    };
    return (
      <TimeContext.Provider value={{ time, duration }}>
        <div style={{ position: 'fixed', inset: 0, background: '#000' }}>
          <div style={canvasStyle}>{children}</div>
        </div>
      </TimeContext.Provider>
    );
  }
  Object.assign(window, { Stage, useTime, interpolate, Easing });
})();
</script>

<!-- Demo header composition -->
<script type="text/babel" data-presets="env,react">
const { useTime, interpolate, Easing, Stage } = window;

/* ───────── design tokens (from site/assets/tailwind.css) ───────── */
const COLOR = {
  bg: '#0a0a0a',
  bgSoft: '#111114',
  ink: '#ededed',
  inkSoft: '#a1a1aa',
  muted: '#71717a',
  faint: '#52525b',
  amber: '#f59e0b',
  cyan: '#22d3ee',
  border: '#27272a',
  borderSoft: '#1c1c1f',
};

/* ───────── content data ───────── */
const REQUESTS = [
  { id: 0, t0: 0.10, client: 'claude-code', endpoint: '/v1/messages',          op: 'convert',     provider: 'deepseek',  model: 'deepseek-v3.2', cost: '$0.003', dur: '1.21s' },
  { id: 1, t0: 0.95, client: 'codex',       endpoint: '/responses',            op: 'route',       provider: 'kimi',      model: 'kimi-k2-think', cost: '$0.004', dur: '0.84s' },
  { id: 2, t0: 1.80, client: 'gemini-cli',  endpoint: '/:generateContent',     op: 'pass-through',provider: 'google',    model: 'gemini-2.5-pro',cost: '$0.012', dur: '1.55s' },
  { id: 3, t0: 2.65, client: 'claude-code', endpoint: '/v1/messages',          op: 'failover',    provider: 'glm',       model: 'glm-4.6',       cost: '$0.002', dur: '0.62s' },
];

const CLIENTS  = ['claude-code', 'codex', 'gemini-cli'];
const PROVIDERS = ['anthropic', 'deepseek', 'kimi', 'google', 'glm'];

const OP_COLOR = {
  'convert':      COLOR.amber,
  'route':        COLOR.cyan,
  'pass-through': COLOR.inkSoft,
  'failover':     '#ef4444',
};

/* ───────── layout constants ───────── */
const W = 1280, H = 600;
const PAD = 32;
const BAR_H = 28;
const MAIN_TOP = PAD + BAR_H + 12;
const MAIN_H = 232;
const TRACE_TOP = MAIN_TOP + MAIN_H + 14;
const TRACE_H = H - PAD - TRACE_TOP;

/* lane positions */
const CLIENT_X = PAD + 16;
const CLIENT_W = 200;
const GATE_X = PAD + 320;
const GATE_W = 540;
const PROVIDER_X = PAD + 320 + 540 + 32;
const PROVIDER_W = 280;

const CLIENT_Y = [MAIN_TOP + 54, MAIN_TOP + 114, MAIN_TOP + 174];
const PROVIDER_Y = [
  MAIN_TOP + 32,
  MAIN_TOP + 74,
  MAIN_TOP + 116,
  MAIN_TOP + 158,
  MAIN_TOP + 200,
];

/* ───────── helpers ───────── */
const clientIdx = (name) => CLIENTS.indexOf(name);
const providerIdx = (name) => PROVIDERS.indexOf(name);

/* a single request packet that flies from client → gate → provider */
function Packet({ req }) {
  const t = useTime();
  const REQ_DUR = 0.75;
  const rel = t - req.t0;
  if (rel < 0 || rel > REQ_DUR + 0.4) return null;
  const p = Math.max(0, Math.min(1, rel / REQ_DUR));

  const cIdx = clientIdx(req.client);
  const pIdx = providerIdx(req.provider);
  const startX = CLIENT_X + CLIENT_W - 8;
  const startY = CLIENT_Y[cIdx] + 18;
  const gateMidX = GATE_X + GATE_W / 2;
  const gateMidY = MAIN_TOP + MAIN_H / 2;
  const endX = PROVIDER_X + 8;
  const endY = PROVIDER_Y[pIdx] + 18;

  let x, y, opacity;
  if (p < 0.5) {
    const q = Easing.easeInOut(p / 0.5);
    x = startX + (gateMidX - startX) * q;
    y = startY + (gateMidY - startY) * q;
    opacity = interpolate(p, [0, 0.1], [0, 1]);
  } else {
    const q = Easing.easeInOut((p - 0.5) / 0.5);
    x = gateMidX + (endX - gateMidX) * q;
    y = gateMidY + (endY - gateMidY) * q;
    opacity = interpolate(p, [0.85, 1], [1, 0]);
  }

  const color = OP_COLOR[req.op] || COLOR.amber;

  return (
    <>
      {/* glow */}
      <div style={{
        position: 'absolute',
        left: x - 14, top: y - 14,
        width: 28, height: 28,
        borderRadius: '50%',
        background: color,
        filter: 'blur(10px)',
        opacity: opacity * 0.55,
      }} />
      {/* core */}
      <div style={{
        position: 'absolute',
        left: x - 5, top: y - 5,
        width: 10, height: 10,
        borderRadius: '50%',
        background: color,
        boxShadow: `0 0 12px ${color}`,
        opacity,
      }} />
    </>
  );
}

/* the gate's current operation label rotates as packets pass through it */
function GateOperation() {
  const t = useTime();
  // find which request is "inside" the gate right now (near midpoint p≈0.5)
  let activeReq = null;
  for (const r of REQUESTS) {
    const rel = t - r.t0;
    if (rel > 0.15 && rel < 0.65) { activeReq = r; break; }
  }
  return activeReq;
}

/* the gate panel (center) */
function GatePanel() {
  const t = useTime();
  const activeReq = GateOperation();
  const breathPulse = 0.5 + 0.5 * Math.sin(t * 1.8);

  return (
    <div style={{
      position: 'absolute',
      left: GATE_X, top: MAIN_TOP,
      width: GATE_W, height: MAIN_H,
      background: COLOR.bgSoft,
      border: `1px solid ${COLOR.border}`,
      borderRadius: 8,
      boxShadow: `0 0 0 1px ${COLOR.borderSoft}, 0 20px 60px -20px rgba(245, 158, 11, ${0.10 + 0.05 * breathPulse}), 0 0 80px -30px rgba(34, 211, 238, 0.12)`,
      padding: 24,
      display: 'flex', flexDirection: 'column',
    }}>
      {/* header row */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        fontSize: 11, color: COLOR.muted, letterSpacing: '0.08em',
      }}>
        <span style={{ color: COLOR.amber, fontWeight: 600 }}>▲</span>
        <span style={{ color: COLOR.ink, fontWeight: 600 }}>AGENTGATE</span>
        <span style={{ color: COLOR.faint }}>·</span>
        <span style={{ color: COLOR.cyan }}>127.0.0.1:9090</span>
        <span style={{ color: COLOR.faint }}>·</span>
        <span style={{ color: COLOR.muted }}>local</span>
        <div style={{ flex: 1 }} />
        <span style={{ color: COLOR.amber, opacity: 0.4 + 0.6 * breathPulse }}>●</span>
        <span style={{ color: COLOR.inkSoft, fontSize: 10 }}>active</span>
      </div>

      {/* divider */}
      <div style={{ marginTop: 16, borderTop: `1px dashed ${COLOR.borderSoft}` }} />

      {/* current operation */}
      <div style={{ marginTop: 22, flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        <div style={{ fontSize: 11, color: COLOR.faint, letterSpacing: '0.12em', textTransform: 'uppercase' }}>
          <span style={{ color: COLOR.faint }}># </span>operation
        </div>
        <div style={{
          marginTop: 8, fontSize: 30, fontWeight: 700,
          color: activeReq ? OP_COLOR[activeReq.op] : COLOR.inkSoft,
          letterSpacing: '-0.01em',
          transition: 'color 120ms ease',
          minHeight: 38,
        }}>
          {activeReq ? activeReq.op : <span style={{ color: COLOR.muted }}>idle</span>}
          <span style={{ color: COLOR.amber, opacity: activeReq ? 0 : 1, marginLeft: 6, fontSize: 26 }}>▊</span>
        </div>

        {/* tag pills */}
        <div style={{ marginTop: 18, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {['convert', 'pass-through', 'route', 'trace', 'failover'].map(tag => {
            const isActive = activeReq && activeReq.op === tag;
            return (
              <span key={tag} style={{
                fontSize: 11,
                padding: '4px 9px',
                borderRadius: 4,
                border: `1px solid ${isActive ? OP_COLOR[tag] || COLOR.amber : COLOR.border}`,
                color: isActive ? (OP_COLOR[tag] || COLOR.amber) : COLOR.muted,
                background: isActive ? `${OP_COLOR[tag] || COLOR.amber}14` : 'transparent',
              }}>{tag}</span>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* lane labels — clients (left) */
function ClientLane({ name, idx }) {
  const t = useTime();
  // light up when this client is sending
  let active = false;
  for (const r of REQUESTS) {
    const rel = t - r.t0;
    if (r.client === name && rel > -0.05 && rel < 0.25) { active = true; break; }
  }
  return (
    <div style={{
      position: 'absolute',
      left: CLIENT_X, top: CLIENT_Y[idx],
      width: CLIENT_W, height: 36,
      background: COLOR.bgSoft,
      border: `1px solid ${active ? COLOR.amber : COLOR.border}`,
      borderRadius: 6,
      padding: '0 14px',
      display: 'flex', alignItems: 'center', gap: 10,
      transition: 'border-color 120ms ease',
    }}>
      <span style={{ color: active ? COLOR.amber : COLOR.faint, fontSize: 10 }}>$</span>
      <span style={{ color: active ? COLOR.ink : COLOR.inkSoft, fontSize: 13, fontWeight: 500 }}>{name}</span>
      <div style={{ flex: 1 }} />
      <span style={{ color: active ? COLOR.amber : COLOR.faint, fontSize: 14 }}>→</span>
    </div>
  );
}

/* provider labels (right) */
function ProviderLane({ name, idx }) {
  const t = useTime();
  let active = false;
  for (const r of REQUESTS) {
    const rel = t - r.t0;
    if (r.provider === name && rel > 0.45 && rel < 0.85) { active = true; break; }
  }
  return (
    <div style={{
      position: 'absolute',
      left: PROVIDER_X, top: PROVIDER_Y[idx],
      width: PROVIDER_W, height: 36,
      background: COLOR.bgSoft,
      border: `1px solid ${active ? COLOR.cyan : COLOR.border}`,
      borderRadius: 6,
      padding: '0 14px',
      display: 'flex', alignItems: 'center', gap: 10,
      transition: 'border-color 120ms ease',
    }}>
      <span style={{ color: active ? COLOR.cyan : COLOR.faint, fontSize: 14 }}>←</span>
      <span style={{ color: active ? COLOR.cyan : COLOR.faint, fontSize: 10 }}>▸</span>
      <span style={{ color: active ? COLOR.ink : COLOR.inkSoft, fontSize: 13, fontWeight: 500 }}>{name}</span>
    </div>
  );
}

/* dimmed historical entries (always visible, no animation) — sell the "live log" feel */
const HISTORY = [
  { time: '18:22:58', client: 'codex',       endpoint: '/responses',        op: 'route',        model: 'glm-4.6',           dur: '0.91s', cost: '$0.002' },
  { time: '18:22:59', client: 'claude-code', endpoint: '/v1/messages',      op: 'pass-through', model: 'claude-sonnet-4.5', dur: '1.34s', cost: '$0.018' },
];

/* trace log */
function TraceLog() {
  const t = useTime();
  return (
    <div style={{
      position: 'absolute',
      left: PAD, top: TRACE_TOP,
      width: W - 2 * PAD, height: TRACE_H,
      background: COLOR.bgSoft,
      border: `1px solid ${COLOR.border}`,
      borderRadius: 8,
      padding: '14px 22px',
    }}>
      {/* trace header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 11, color: COLOR.muted, letterSpacing: '0.08em' }}>
        <span style={{ color: COLOR.faint }}>#</span>
        <span style={{ color: COLOR.ink, fontWeight: 600 }}>trace</span>
        <span style={{ color: COLOR.faint }}>·</span>
        <span style={{ color: COLOR.muted }}>every request observable</span>
        <div style={{ flex: 1 }} />
        <span style={{ color: COLOR.muted, fontSize: 10 }}>live</span>
        <span className="pulse-dot" style={{ color: COLOR.amber, fontSize: 10 }}>●</span>
      </div>

      <div style={{ marginTop: 10, borderTop: `1px solid ${COLOR.borderSoft}` }} />

      {/* log lines */}
      <div style={{ marginTop: 8, fontSize: 13, lineHeight: 1.75 }}>
        {/* historical dimmed lines */}
        {HISTORY.map((h, i) => (
          <div key={'h' + i} style={{
            opacity: 0.42,
            display: 'grid',
            gridTemplateColumns: '70px 130px 165px 130px 1fr 60px 60px 16px',
            gap: 12,
            alignItems: 'baseline',
            color: COLOR.muted,
            fontVariantNumeric: 'tabular-nums',
          }}>
            <span style={{ color: COLOR.faint }}>{h.time}</span>
            <span>{h.client}</span>
            <span>{h.endpoint}</span>
            <span>{h.op}</span>
            <span>
              <span style={{ color: COLOR.faint }}>→ </span>
              <span>{h.model}</span>
            </span>
            <span style={{ textAlign: 'right' }}>{h.dur}</span>
            <span style={{ textAlign: 'right' }}>{h.cost}</span>
            <span>✓</span>
          </div>
        ))}

        {/* live animated lines — always visible, brief amber flash on arrival */}
        {REQUESTS.map((r, i) => {
          const flashAt = r.t0 + 0.42; // moment packet "arrives" at provider, trace updates
          // Two flashes possible: one at start (if t < flashAt: still showing previous loop's value),
          // one at flashAt. For loop seamlessness, line is just permanently visible.
          // Flash effect: brief background tint around flashAt
          const flashStrength = Math.max(0, 1 - Math.abs(t - flashAt) / 0.18);
          const opColor = OP_COLOR[r.op] || COLOR.amber;
          const baseTime = '18:23:0' + (1 + i);
          return (
            <div key={r.id} style={{
              position: 'relative',
              display: 'grid',
              gridTemplateColumns: '70px 130px 165px 130px 1fr 60px 60px 16px',
              gap: 12,
              alignItems: 'baseline',
              color: COLOR.inkSoft,
              fontVariantNumeric: 'tabular-nums',
              background: flashStrength > 0
                ? `linear-gradient(90deg, ${opColor}${Math.floor(flashStrength * 38).toString(16).padStart(2,'0')} 0%, transparent 60%)`
                : 'transparent',
              marginLeft: -8, paddingLeft: 8, marginRight: -8, paddingRight: 8,
              borderRadius: 3,
            }}>
              <span style={{ color: COLOR.faint }}>{baseTime}</span>
              <span style={{ color: COLOR.ink }}>{r.client}</span>
              <span style={{ color: COLOR.muted }}>{r.endpoint}</span>
              <span style={{ color: opColor, fontWeight: 500 }}>{r.op}</span>
              <span>
                <span style={{ color: COLOR.faint }}>→ </span>
                <span style={{ color: COLOR.cyan }}>{r.model}</span>
              </span>
              <span style={{ color: COLOR.muted, textAlign: 'right' }}>{r.dur}</span>
              <span style={{ color: COLOR.muted, textAlign: 'right' }}>{r.cost}</span>
              <span style={{ color: '#22c55e' }}>✓</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* top status bar */
function StatusBar() {
  return (
    <div style={{
      position: 'absolute',
      left: PAD, top: PAD,
      width: W - 2 * PAD, height: BAR_H,
      display: 'flex', alignItems: 'center', gap: 10,
      fontSize: 12, color: COLOR.inkSoft,
    }}>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#ff5f56', display: 'inline-block' }} />
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#ffbd2e', display: 'inline-block' }} />
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#27c93f', display: 'inline-block' }} />
      <div style={{ marginLeft: 18, display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ color: COLOR.amber, fontWeight: 600 }}>$</span>
        <span style={{ color: COLOR.inkSoft }}>agentgate</span>
        <span style={{ color: COLOR.amber }}>trace</span>
        <span style={{ color: COLOR.inkSoft }}>-f</span>
      </div>
      <div style={{ flex: 1 }} />
      <span style={{ color: COLOR.muted }}>v1.4.1</span>
      <span style={{ color: COLOR.faint }}>·</span>
      <span style={{ color: COLOR.muted }}>26 providers</span>
      <span style={{ color: COLOR.faint }}>·</span>
      <span style={{ color: COLOR.muted }}>local</span>
    </div>
  );
}

/* faint grid background */
function GridBackground() {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      backgroundImage: `linear-gradient(${COLOR.borderSoft} 1px, transparent 1px), linear-gradient(90deg, ${COLOR.borderSoft} 1px, transparent 1px)`,
      backgroundSize: '48px 48px',
      backgroundPosition: '-1px -1px',
      opacity: 0.35,
      WebkitMaskImage: 'radial-gradient(ellipse at center, #000 0%, transparent 80%)',
      maskImage: 'radial-gradient(ellipse at center, #000 0%, transparent 80%)',
    }} />
  );
}

/* watermark */
function Watermark() {
  return (
    <div style={{
      position: 'absolute', bottom: 12, right: PAD,
      fontSize: 10, color: 'rgba(237,237,237,0.18)',
      letterSpacing: '0.16em',
      pointerEvents: 'none',
    }}>
      Created by Huashu-Design
    </div>
  );
}

function Composition() {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      color: COLOR.ink,
      fontFamily: '"JetBrains Mono", ui-monospace, monospace',
    }}>
      <GridBackground />
      <StatusBar />

      {CLIENTS.map((c, i) => <ClientLane key={c} name={c} idx={i} />)}
      <GatePanel />
      {PROVIDERS.map((p, i) => <ProviderLane key={p} name={p} idx={i} />)}

      {REQUESTS.map(r => <Packet key={r.id} req={r} />)}

      <TraceLog />
      <Watermark />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Stage duration={3.5} width={W} height={H} loop={true} bgColor={COLOR.bg}>
    <Composition />
  </Stage>
);
// signal for screenshot/recording readiness
setTimeout(() => { if (typeof window !== 'undefined') window.__ready = true; }, 800);
</script>
</body>
</html>
