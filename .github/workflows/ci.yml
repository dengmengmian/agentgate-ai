name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint + format + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # 只审生产依赖:dev 工具链(vitest/jsdom/undici 等)的传递漏洞不进
      # 最终 app,不该卡 CI;生产依赖当前零漏洞,-D low 门槛守得住。
      - name: Audit production deps
        run: pnpm audit --prod --audit-level=low

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright smoke
        run: node scripts/test-playwright-smoke.mjs

      - name: Test
        run: pnpm test:run

      - name: Download docs check
        run: pnpm docs:download:check

  quickstart-smoke:
    name: Quickstart core smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: quickstart-smoke

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run quickstart smoke
        run: pnpm test:quickstart

  fixture-tests:
    name: Offline capability + protocol fixture tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      # `tauri` is in the dependency graph of the test binaries even though
      # the tests never spin up a window, so the linker still needs gdk /
      # webkit headers at compile time. Mirror release.yml's build deps.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: fixture-tests

      - name: Rustfmt check
        working-directory: src-tauri
        run: cargo fmt --check

      # clippy 与下面的 lib test 用同一 feature 组合(cli,无 GUI),复用同一份缓存编译。
      # -D warnings:存量已清零,之后任何新 warning 直接挡在 CI。
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --no-default-features --features cli --lib -- -D warnings

      # cli feature 的 agentgate-serve bin 不在 `cargo test` 的编译范围内,
      # 单独 build 一次,防止 CLI 编译失败只在 release 才暴露(1.3.6 就是这么漏的)。
      - name: Build headless agentgate-serve (no Tauri)
        working-directory: src-tauri
        run: cargo build --no-default-features --features cli --bin agentgate-serve

      # lib 单元测试(1100+ 个)之前完全没进 CI,导致单测回归长期潜伏
      # (如 pricing 红测试)。复用上面的 cli 编译缓存跑一遍。
      - name: Run library unit tests
        working-directory: src-tauri
        run: cargo test --no-default-features --features cli --lib

      - name: Run capability + protocol fixture tests
        working-directory: src-tauri
        run: |
          cargo test --test capability_fixture \
                     --test mimo_capabilities \
                     --test deepseek_capabilities \
                     --test kimi_capabilities \
                     --test protocol_fixture \
                     -- --nocapture

  cargo-audit:
    name: Rust dependency audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      # 预编译二进制,秒级安装,不用每次 cargo install 编译。
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # 默认只对 vulnerability 级 RUSTSEC 漏洞 fail;unmaintained / unsound
      # 类 warning(多为 tauri/webkit 桌面传递依赖)不阻断。当前 0 漏洞。
      - name: Audit Rust deps
        working-directory: src-tauri
        run: cargo audit
