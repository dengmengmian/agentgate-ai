name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint + format + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

  fixture-tests:
    name: Offline capability + protocol fixture tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      # `tauri` is in the dependency graph of the test binaries even though
      # the tests never spin up a window, so the linker still needs gdk /
      # webkit headers at compile time. Mirror release.yml's build deps.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: fixture-tests

      # cli feature 的 agentgate-serve bin 不在 `cargo test` 的编译范围内,
      # 单独 build 一次,防止 CLI 编译失败只在 release 才暴露(1.3.6 就是这么漏的)。
      - name: Build headless agentgate-serve (no Tauri)
        working-directory: src-tauri
        run: cargo build --no-default-features --features cli --bin agentgate-serve

      - name: Run capability + protocol fixture tests
        working-directory: src-tauri
        run: |
          cargo test --test capability_fixture \
                     --test mimo_capabilities \
                     --test deepseek_capabilities \
                     --test kimi_capabilities \
                     --test protocol_fixture \
                     -- --nocapture
