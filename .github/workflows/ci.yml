name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  fixture-tests:
    name: Offline capability + protocol fixture tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      # `tauri` is in the dependency graph of the test binaries even though
      # the tests never spin up a window, so the linker still needs gdk /
      # webkit headers at compile time. Mirror release.yml's build deps.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: fixture-tests

      - name: Run capability + protocol fixture tests
        working-directory: src-tauri
        run: |
          cargo test --test capability_fixture \
                     --test mimo_capabilities \
                     --test deepseek_capabilities \
                     --test kimi_capabilities \
                     --test protocol_fixture \
                     -- --nocapture
