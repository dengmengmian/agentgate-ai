name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install

      - name: Provider catalog drift check
        run: pnpm provider:catalog:check

      - name: Docker preflight
        run: bash scripts/release-preflight.sh

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin --bundles app,dmg
            rust_target: aarch64-apple-darwin
          - platform: macos-14
            args: --target x86_64-apple-darwin --bundles app,dmg
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
            rust_target: ''
          - platform: windows-2022
            args: --bundles nsis
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-2022'
        run: choco install wixtoolset nsis -y --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Prepare App Store Connect API key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          if [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_KEY_CONTENT" ]; then
            echo "APPLE_API_KEY and APPLE_API_KEY_CONTENT secrets are required for macOS notarization" >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/private_keys"
          api_key_path="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $GITHUB_REF_NAME"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Check updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is required because createUpdaterArtifacts is enabled"
            exit 1
          fi

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.ci.conf.json

  updater-json:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Publish merged updater JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-updater-json.mjs

  cli:
    needs: updater-json
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            archive: agentgate-serve-aarch64-apple-darwin.tar.gz
            bin: agentgate-serve
          - platform: macos-latest
            target: x86_64-apple-darwin
            archive: agentgate-serve-x86_64-apple-darwin.tar.gz
            bin: agentgate-serve
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: agentgate-serve-x86_64-unknown-linux-gnu.tar.gz
            bin: agentgate-serve
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            archive: agentgate-serve-x86_64-pc-windows-msvc.zip
            bin: agentgate-serve.exe

    runs-on: ${{ matrix.platform }}
    env:
      CARGO_TARGET_DIR: src-tauri/target/cli-${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: cli-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --features cli --target ${{ matrix.target }} --bin agentgate-serve

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "$CARGO_TARGET_DIR/${{ matrix.target }}/release" -czf "dist/${{ matrix.archive }}" "${{ matrix.bin }}"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$env:CARGO_TARGET_DIR/${{ matrix.target }}/release/${{ matrix.bin }}" -DestinationPath "dist/${{ matrix.archive }}"

      - name: Upload CLI to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "dist/${{ matrix.archive }}" --clobber
