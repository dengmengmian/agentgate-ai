name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe how you'd like this to work
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Provider support
        - New Client support
        - Protocol conversion
        - UI / UX
        - Performance
        - Cost tracking
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds or alternative approaches you've tried?
