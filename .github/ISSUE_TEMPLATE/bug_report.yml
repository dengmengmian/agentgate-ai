name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: AgentGate Version
      placeholder: "e.g. 0.4.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: Client
      options:
        - Codex
        - Claude Code
        - OpenCode
        - Gemini CLI
        - AtomCode
        - curl / API
        - Other
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: "e.g. DeepSeek, OpenAI, Kimi"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Describe the expected behavior
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages, request logs, or terminal output (redact API keys!)
      render: shell
